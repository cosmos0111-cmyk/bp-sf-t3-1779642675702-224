<style>
  :root {
    --bg-primary: #0a0a0a;
    --bg-secondary: #121212;
    --bg-card: #1a1a1a;
    --text-primary: #f0f0f0;
    --text-secondary: #a0a0a0;
    --accent-primary: #ff2a6d;
    --accent-secondary: #00ff88;
    --accent-tertiary: #7000ff;
    --border-color: #2a2a2a;
    --neon-glow: 0 0 20px rgba(255, 42, 109, 0.3);
    --shadow-card: 0 4px 12px rgba(0, 0, 0, 0.5);
    --font-mono: 'JetBrains Mono', monospace;
    --font-sans: 'Space Grotesk', sans-serif;
  }

  *, *::before, *::after {
    box-sizing: border-box;
  }

  body {
    font-family: var(--font-sans);
    background-color: var(--bg-primary);
    color: var(--text-primary);
    line-height: 1.7;
    min-height: 100vh;
    margin: 0;
    display: flex;
    flex-direction: column;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* 헤더 */
  .site-header {
    background: var(--bg-secondary);
    border-bottom: 2px solid var(--accent-primary);
    padding: 16px 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--neon-glow);
  }

  .header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo a {
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 1.5rem;
    color: var(--accent-primary);
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .logo a:hover {
    color: var(--accent-secondary);
    text-shadow: 0 0 15px var(--accent-secondary);
  }

  /* hamburger-menu 패턴 */
  .nav-toggle {
    display: none;
  }

  .hamburger-icon {
    display: none;
    flex-direction: column;
    cursor: pointer;
    gap: 5px;
    padding: 5px;
  }

  .hamburger-icon span {
    display: block;
    width: 28px;
    height: 3px;
    background: var(--text-primary);
    border-radius: 2px;
    transition: all 0.3s ease;
  }

  .main-nav {
    display: flex;
    gap: 32px;
    align-items: center;
  }

  .main-nav a {
    color: var(--text-secondary);
    text-decoration: none;
    font-family: var(--font-mono);
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: color 0.3s, text-shadow 0.3s;
  }

  .main-nav a:hover,
  .main-nav a.active {
    color: var(--accent-primary);
    text-shadow: 0 0 10px var(--accent-primary);
  }

  .main-nav a.active {
    border-bottom: 2px solid var(--accent-primary);
  }

  @media (max-width: 768px) {
    .hamburger-icon {
      display: flex;
    }

    .nav-toggle:checked ~ .main-nav {
      display: flex;
      flex-direction: column;
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--bg-secondary);
      padding: 20px;
      border-bottom: 2px solid var(--accent-primary);
    }

    .main-nav {
      display: none;
      gap: 16px;
    }

    .nav-toggle:checked + .hamburger-icon span:nth-child(1) {
      transform: rotate(45deg) translate(5px, 5px);
    }

    .nav-toggle:checked + .hamburger-icon span:nth-child(2) {
      opacity: 0;
    }

    .nav-toggle:checked + .hamburger-icon span:nth-child(3) {
      transform: rotate(-45deg) translate(5px, -5px);
    }

    .header-inner {
      position: relative;
    }
  }

  /* 히어로 */
  .hero-info {
    padding: 100px 0 60px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .hero-info::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at 30% 50%, rgba(112, 0, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 70% 50%, rgba(0, 255, 136, 0.05) 0%, transparent 50%);
    pointer-events: none;
  }

  .hero-info h1 {
    font-family: var(--font-mono);
    font-size: 3rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 4px;
    margin-bottom: 16px;
    background: linear-gradient(135deg, var(--accent-primary), var(--accent-tertiary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
  }

  .hero-info .subtitle {
    font-size: 1.2rem;
    color: var(--text-secondary);
    max-width: 700px;
    margin: 0 auto 30px;
    line-height: 1.8;
  }

  .hero-info .badge {
    display: inline-block;
    background: var(--bg-card);
    border: 1px solid var(--accent-secondary);
    color: var(--accent-secondary);
    padding: 8px 24px;
    font-family: var(--font-mono);
    font-size: 0.85rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    border-radius: 4px;
  }

  /* 섹션 공통 */
  .section {
    padding: 80px 0;
    border-bottom: 1px solid var(--border-color);
  }

  .section:last-child {
    border-bottom: none;
  }

  .section-heading {
    font-family: var(--font-mono);
    font-size: 1.8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 12px;
    color: var(--text-primary);
    position: relative;
    display: inline-block;
  }

  .section-heading::after {
    content: '';
    display: block;
    width: 60%;
    height: 3px;
    background: var(--accent-primary);
    margin-top: 8px;
    transition: width 0.3s;
  }

  .section:hover .section-heading::after {
    width: 100%;
  }

  .section-subtitle {
    color: var(--text-secondary);
    font-size: 1rem;
    margin-bottom: 40px;
    max-width: 600px;
  }

  /* 카드 */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 24px;
  }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    padding: 32px 24px;
    border-radius: 8px;
    transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
  }

  .card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-card), 0 0 15px rgba(255, 42, 109, 0.1);
    border-color: var(--accent-primary);
  }

  .card .card-icon {
    font-size: 2rem;
    margin-bottom: 16px;
    display: block;
  }

  .card h3 {
    font-family: var(--font-mono);
    font-size: 1.2rem;
    font-weight: 700;
    margin-bottom: 12px;
    color: var(--accent-primary);
  }

  .card p {
    color: var(--text-secondary);
    font-size: 0.95rem;
    line-height: 1.7;
  }

  .card .stat {
    font-family: var(--font-mono);
    font-size: 2.5rem;
    font-weight: 700;
    color: var(--accent-secondary);
    display: block;
    margin-bottom: 8px;
  }

  /* 타임라인 */
  .timeline {
    position: relative;
    padding-left: 40px;
    margin-top: 20px;
  }

  .timeline::before {
    content: '';
    position: absolute;
    left: 15px;
    top: 0;
    bottom: 0;
    width: 2px;
    background: var(--accent-tertiary);
  }

  .timeline-item {
    position: relative;
    margin-bottom: 40px;
  }

  .timeline-item::before {
    content: '';
    position: absolute;
    left: -33px;
    top: 6px;
    width: 12px;
    height: 12px;
    background: var(--accent-secondary);
    border-radius: 50%;
    border: 3px solid var(--bg-primary);
  }

  .timeline-item .year {
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 1.2rem;
    color: var(--accent-primary);
    margin-bottom: 4px;
  }

  .timeline-item p {
    color: var(--text-secondary);
    font-size: 0.95rem;
  }

  /* FAQ */
  .faq-list {
    display: grid;
    gap: 16px;
  }

  .faq-item {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 6px;
    overflow: hidden;
    transition: border-color 0.3s;
  }

  .faq-item:hover {
    border-color: var(--accent-primary);
  }

  .faq-question {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 24px;
    cursor: pointer;
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 0.95rem;
    color: var(--text-primary);
    background: transparent;
    border: none;
    width: 100%;
    text-align: left;
    transition: background 0.3s;
  }

  .faq-question:hover {
    background: rgba(255, 42, 109, 0.05);
  }

  .faq-question .toggle-icon {
    font-size: 1.2rem;
    transition: transform 0.3s;
  }

</body>
